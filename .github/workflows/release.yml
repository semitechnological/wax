name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
            asset_name: wax-linux-x64
            use_cross: false

          - os: ubuntu-latest
            platform: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
            asset_name: wax-linux-arm64
            use_cross: true

          - os: macos-13
            platform: macos
            arch: x64
            target: x86_64-apple-darwin
            asset_name: wax-macos-x64
            use_cross: false

          - os: macos-14
            platform: macos
            arch: arm64
            target: aarch64-apple-darwin
            asset_name: wax-macos-arm64
            use_cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64 only)
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build release binary (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build release binary (native)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/wax ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    name: Update homebrew tap formula
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: undivisible/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Download release assets and compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          for asset in wax-linux-x64 wax-linux-arm64 wax-macos-x64 wax-macos-arm64; do
            gh release download "$TAG" \
              --repo ${{ github.repository }} \
              --pattern "$asset" \
              --dir /tmp/assets
          done
          cd /tmp/assets
          sha256sum wax-linux-x64   | awk '{print $1}' > sha256-linux-x64.txt
          sha256sum wax-linux-arm64 | awk '{print $1}' > sha256-linux-arm64.txt
          sha256sum wax-macos-x64   | awk '{print $1}' > sha256-macos-x64.txt
          sha256sum wax-macos-arm64 | awk '{print $1}' > sha256-macos-arm64.txt

      - name: Rewrite formula with versioned URLs and SHA256s
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"

          SHA_LINUX_X64=$(cat /tmp/assets/sha256-linux-x64.txt)
          SHA_LINUX_ARM64=$(cat /tmp/assets/sha256-linux-arm64.txt)
          SHA_MACOS_X64=$(cat /tmp/assets/sha256-macos-x64.txt)
          SHA_MACOS_ARM64=$(cat /tmp/assets/sha256-macos-arm64.txt)

          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          cat > homebrew-tap/Formula/wax.rb <<FORMULA
# NOTE: Versioned bottles will be added once CI publishes release assets.
class Wax < Formula
  desc "Fast Homebrew-compatible package manager"
  homepage "https://github.com/${REPO}"
  version "${VERSION}"
  license "MIT"

  on_macos do
    on_arm do
      url "${BASE_URL}/wax-macos-arm64"
      sha256 "${SHA_MACOS_ARM64}"

      def install
        bin.install "wax-macos-arm64" => "wax"
      end
    end

    on_intel do
      url "${BASE_URL}/wax-macos-x64"
      sha256 "${SHA_MACOS_X64}"

      def install
        bin.install "wax-macos-x64" => "wax"
      end
    end
  end

  on_linux do
    on_arm do
      url "${BASE_URL}/wax-linux-arm64"
      sha256 "${SHA_LINUX_ARM64}"

      def install
        bin.install "wax-linux-arm64" => "wax"
      end
    end

    on_intel do
      url "${BASE_URL}/wax-linux-x64"
      sha256 "${SHA_LINUX_X64}"

      def install
        bin.install "wax-linux-x64" => "wax"
      end
    end
  end

  test do
    assert_match version.to_s, shell_output("#{bin}/wax --version")
  end
end
FORMULA

      - name: Commit and push updated formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/wax.rb
          git commit -m "chore: update wax formula to ${{ github.ref_name }}"
          git push
