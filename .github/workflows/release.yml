name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.13.3)'
        required: true
        default: 'v0.13.3'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: wax-linux-x64
            use_cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: wax-linux-arm64
            use_cross: true

          - os: macos-14
            target: x86_64-apple-darwin
            asset_name: wax-macos-x64
            use_cross: false

          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: wax-macos-arm64
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: wax-windows-x64.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64 only)
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use_cross == false && runner.os != 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (native, Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/wax ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.asset_name }} | awk '{print $1}' > ${{ matrix.asset_name }}.sha256
          else
            shasum -a 256 ${{ matrix.asset_name }} | awk '{print $1}' > ${{ matrix.asset_name }}.sha256
          fi

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/wax.exe" "${{ matrix.asset_name }}"
          $h = (Get-FileHash "${{ matrix.asset_name }}" -Algorithm SHA256).Hash.ToLowerInvariant()
          $h | Out-File -FilePath "${{ matrix.asset_name }}.sha256" -Encoding ascii -NoNewline

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
