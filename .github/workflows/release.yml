name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.13.2)'
        required: true
        default: 'v0.13.2'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: wax-linux-x64
            use_cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: wax-linux-arm64
            use_cross: true

          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: wax-macos-x64
            use_cross: false

          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: wax-macos-arm64
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64 only)
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        run: |
          cp target/${{ matrix.target }}/release/wax ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
