name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: wax-linux-x64
            use_cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: wax-linux-arm64
            use_cross: true

          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: wax-macos-x64
            use_cross: false

          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: wax-macos-arm64
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64 only)
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        run: |
          cp target/${{ matrix.target }}/release/wax ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    name: Update homebrew tap
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: semitechnological/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Download release assets and compute SHA256s
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p /tmp/assets
          for asset in wax-linux-x64 wax-linux-arm64 wax-macos-x64 wax-macos-arm64; do
            gh release download "$TAG" \
              --repo ${{ github.repository }} \
              --pattern "$asset" \
              --dir /tmp/assets
            sha256sum "/tmp/assets/$asset" | awk '{print $1}' > "/tmp/assets/sha256-${asset}.txt"
          done

      - name: Rewrite tap formula
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          SHA_LINUX_X64=$(cat /tmp/assets/sha256-wax-linux-x64.txt)
          SHA_LINUX_ARM64=$(cat /tmp/assets/sha256-wax-linux-arm64.txt)
          SHA_MACOS_X64=$(cat /tmp/assets/sha256-wax-macos-x64.txt)
          SHA_MACOS_ARM64=$(cat /tmp/assets/sha256-wax-macos-arm64.txt)

          cat > homebrew-tap/Formula/wax.rb <<FORMULA
class Wax < Formula
  desc "Fast Homebrew-compatible package manager"
  homepage "https://github.com/${REPO}"
  version "${VERSION}"
  license "MIT"
  head "https://github.com/${REPO}.git", branch: "master"

  on_macos do
    on_arm do
      url "${BASE_URL}/wax-macos-arm64"
      sha256 "${SHA_MACOS_ARM64}"
    end
    on_intel do
      url "${BASE_URL}/wax-macos-x64"
      sha256 "${SHA_MACOS_X64}"
    end
  end

  on_linux do
    on_arm do
      url "${BASE_URL}/wax-linux-arm64"
      sha256 "${SHA_LINUX_ARM64}"
    end
    on_intel do
      url "${BASE_URL}/wax-linux-x64"
      sha256 "${SHA_LINUX_X64}"
    end
  end

  # rust is only needed when building from HEAD source.
  depends_on "rust" => :build

  def install
    if build.head?
      system "cargo", "install", "--locked", "--root", prefix, "--path", "."
    else
      bin.install Dir["wax-*"].first => "wax"
    end
  end

  test do
    assert_match version.to_s, shell_output("#{bin}/wax --version")
  end
end
FORMULA

      - name: Commit and push updated formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/wax.rb
          git diff --cached --quiet || git commit -m "chore: bump wax to ${{ github.ref_name }}"
          git push
